version = 1
name = "gongkao"

[setup]
script = '''
if [ ! -f .env.local ] && [ -f "${CODEX_SOURCE_TREE_PATH}/.env.local" ]; then
  cp "${CODEX_SOURCE_TREE_PATH}/.env.local" .env.local
fi

if [ ! -x scripts/codex-start.sh ] && [ -x "${CODEX_SOURCE_TREE_PATH}/scripts/codex-start.sh" ]; then
  mkdir -p scripts
  cp "${CODEX_SOURCE_TREE_PATH}/scripts/codex-start.sh" scripts/codex-start.sh
fi

if [ ! -x node_modules/.bin/next ]; then
  source "${NVM_DIR:-${HOME}/.nvm}/nvm.sh"
  nvm use 24.16.0 >/dev/null
  pnpm install --ignore-scripts --lockfile=false
fi
'''

[[actions]]
name = "Start Gongkao"
icon = "run"
command = "exec ./scripts/codex-start.sh"
platform = "darwin"

[[actions]]
name = "Start with Qdrant"
icon = "debug"
command = "exec ./scripts/codex-start.sh --with-qdrant"
platform = "darwin"
